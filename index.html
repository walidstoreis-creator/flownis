<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>متجر بسيط</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

h1 {
  margin: 20px;
}

#products {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.product {
  background: white;
  padding: 15px;
  border-radius: 10px;
  width: 180px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

button {
  background: green;
  color: white;
  border: none;
  padding: 8px;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: darkgreen;
}

#cart-box {
  margin-top: 30px;
  background: white;
  padding: 20px;
  width: 300px;
  margin-left: auto;
  margin-right: auto;
  border-radius: 10px;
}

</style>
</head>

<body>

<h1>🛒 متجر إلكتروني بسيط</h1>

<div id="products"></div>

<div id="cart-box">
  <h2>السلة</h2>
  <ul id="cart"></ul>
  <p id="total"></p>
</div>

<script>
// المنتجات
const products = [
  { id: 1, name: "📱 هاتف", price: 200 },
  { id: 2, name: "💻 حاسوب", price: 800 },
  { id: 3, name: "🎧 سماعات", price: 50 },
  { id: 4, name: "⌚ ساعة", price: 120 }
];

// استرجاع السلة
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// عرض المنتجات
function displayProducts() {
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <h3>${p.name}</h3>
        <p>${p.price} $</p>
        <button onclick="addToCart(${p.id})">أضف للسلة</button>
      </div>
    `;
  });
}

// إضافة للسلة
function addToCart(id) {
  const product = products.find(p => p.id === id);
  cart.push(product);
  saveCart();
}

// حذف من السلة
function removeFromCart(index) {
  cart.splice(index, 1);
  saveCart();
}

// حفظ وتحديث
function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
  displayCart();
}

// عرض السلة
function displayCart() {
  const cartList = document.getElementById("cart");
  const total = document.getElementById("total");

  cartList.innerHTML = "";
  let sum = 0;

  cart.forEach((item, index) => {
    sum += item.price;
    cartList.innerHTML += `
      <li>
        ${item.name} - ${item.price} $
        <button onclick="removeFromCart(${index})">❌</button>
      </li>
    `;
  });

  total.innerText = "المجموع: " + sum + " $";
}

// تشغيل
displayProducts();
displayCart();
</script>

</body>
</html>
