<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jumia Style Store (Full HTML)</title>
<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{background:orange;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center}
nav button{margin-left:10px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;padding:20px}
.product{background:#fff;padding:10px;border-radius:10px;text-align:center}
button{background:orange;color:#fff;border:none;padding:8px;border-radius:5px;cursor:pointer}
.cart{position:fixed;right:20px;top:20px;background:#000;color:#fff;padding:10px;border-radius:50%}
.panel{padding:20px;background:#fff;margin:20px;border-radius:10px}
input{margin:5px;padding:8px}
.hidden{display:none}
</style>
</head>
<body>

<header>
<h2>My Store</h2>
<div>
<span id="user"></span>
<button onclick="showLogin()">Login</button>
<button onclick="showRegister()">Register</button>
</div>
</header>

<div class="cart" id="cart">0</div>

<!-- AUTH -->
<div class="panel hidden" id="auth">
<h3 id="authTitle">Login</h3>
<input id="username" placeholder="Username">
<input id="password" placeholder="Password">
<button onclick="submitAuth()">Submit</button>
</div>

<!-- ADMIN -->
<div class="panel hidden" id="admin">
<h3>Admin Panel</h3>
<input id="pname" placeholder="Product name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">
<button onclick="addProduct()">Add Product</button>
</div>

<!-- PRODUCTS -->
<section class="products" id="products"></section>

<script>
let users = JSON.parse(localStorage.getItem('users')) || [];
let products = JSON.parse(localStorage.getItem('products')) || [
  {id:1,name:"Shoes",price:50,img:"https://picsum.photos/200?1"},
  {id:2,name:"Watch",price:30,img:"https://picsum.photos/200?2"}
];
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let currentUser = null;
let mode = "login";

function save(){
  localStorage.setItem('users',JSON.stringify(users));
  localStorage.setItem('products',JSON.stringify(products));
  localStorage.setItem('cart',JSON.stringify(cart));
}

function render(){
  let html="";
  products.forEach(p=>{
    html += `
    <div class="product">
      <img src="${p.img}" width="100%">
      <h3>${p.name}</h3>
      <p>$${p.price}</p>
      <button onclick="addToCart(${p.id})">Buy</button>
      ${currentUser?.role==='admin' ? `<button onclick="deleteProduct(${p.id})">Delete</button>`:''}
    </div>`;
  });
  document.getElementById('products').innerHTML = html;
  document.getElementById('cart').innerText = cart.length;
}

function addToCart(id){
  cart.push(id);
  save();
  render();
}

function deleteProduct(id){
  products = products.filter(p=>p.id!==id);
  save();
  render();
}

function addProduct(){
  products.push({
    id: Date.now(),
    name: pname.value,
    price: pprice.value,
    img: pimg.value
  });
  save();
  render();
}

function showLogin(){
  mode='login';
  auth.classList.remove('hidden');
  authTitle.innerText='Login';
}

function showRegister(){
  mode='register';
  auth.classList.remove('hidden');
  authTitle.innerText='Register';
}

function submitAuth(){
  if(mode==='register'){
    let role = users.length===0 ? 'admin' : 'user';
    users.push({username:username.value,password:password.value,role});
    alert('Registered');
  } else {
    let u = users.find(u=>u.username===username.value && u.password===password.value);
    if(!u) return alert('Wrong');
    currentUser = u;
    user.innerText = 'Hello '+u.username;
    if(u.role==='admin') admin.classList.remove('hidden');
  }
  save();
  auth.classList.add('hidden');
}

render();
</script>

</body>
</html>
