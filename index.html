<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A-Z Store PRO</title>
<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{background:#111;color:#fff;padding:15px;display:flex;justify-content:space-between}
nav a{color:#fff;margin:0 10px;text-decoration:none}
.hero{background:url('https://picsum.photos/1200/400') center/cover;padding:80px;text-align:center;color:#fff}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px}
.product{background:#fff;padding:15px;border-radius:10px;text-align:center}
.product img{width:100%;border-radius:10px}
button{background:#111;color:#fff;border:none;padding:10px;border-radius:5px;cursor:pointer}
.cartBox{position:fixed;right:20px;top:20px;background:red;color:#fff;padding:10px;border-radius:50%}
.login{position:fixed;top:0;left:0;width:100%;height:100%;background:#000000aa;display:none;justify-content:center;align-items:center}
.login form{background:#fff;padding:20px;border-radius:10px}
input{display:block;margin:10px 0;padding:10px;width:200px}
</style>
</head>
<body>

<header>
<h2>A-Z Store PRO</h2>
<nav>
<a href="#">Home</a>
<a href="#products">Products</a>
<a href="#" onclick="openLogin()">Login</a>
</nav>
</header>

<div class="hero">
<h1>Best Store Online</h1>
<p>Buy anything from A to Z</p>
</div>

<div class="cartBox" id="cart">0</div>

<section class="products" id="products"></section>

<!-- LOGIN -->
<div class="login" id="loginBox">
<form onsubmit="login(event)">
<h3>Login</h3>
<input type="text" id="user" placeholder="Username" required>
<input type="password" id="pass" placeholder="Password" required>
<button>Login</button>
</form>
</div>

<script>
let products=[
{id:1,name:"Nike Shoes",price:50,img:"https://picsum.photos/300?1"},
{id:2,name:"Watch",price:30,img:"https://picsum.photos/300?2"},
{id:3,name:"Bag",price:20,img:"https://picsum.photos/300?3"},
{id:4,name:"Headphones",price:40,img:"https://picsum.photos/300?4"}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

function renderProducts(){
let html="";
products.forEach(p=>{
html+=`<div class="product">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>$${p.price}</p>
<button onclick="addToCart(${p.id})">Add to cart</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function addToCart(id){
cart.push(id);
localStorage.setItem("cart",JSON.stringify(cart));
updateCart();
}

function updateCart(){
document.getElementById("cart").innerText=cart.length;
}

function openLogin(){
document.getElementById("loginBox").style.display="flex";
}

function login(e){
e.preventDefault();
let user=document.getElementById("user").value;
localStorage.setItem("user",user);
alert("Welcome "+user);
document.getElementById("loginBox").style.display="none";
}

renderProducts();
updateCart();
</script>

</body>
</html>
