<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHECK EFOOTBALL AI Pro - تقييم الحسابات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #0b0f1a; 
            background-image: radial-gradient(ellipse at top, #1e3a8a 0%, #0b0f1a 70%);
            color: white; 
            min-height: 100vh;
        }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .loader { border: 3px solid rgba(255, 255, 255, 0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fade-in-up 0.6s ease-out forwards; }
        .players-scroll::-webkit-scrollbar { width: 5px; }
        .players-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); rounded-full; }
        .players-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        select option { background-color: #0f172a; color: white; }
    </style>
</head>
<body class="flex flex-col items-center p-4 sm:p-8">

    <header class="w-full max-w-2xl text-center my-8 animate-fade-in-up">
        <h1 class="text-5xl sm:text-6xl font-extrabold mb-3 tracking-tight drop-shadow-2xl">
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">Check eFootball</span>
            <span class="text-white">AI Pro</span>
        </h1>
        <p class="text-gray-400 text-lg sm:text-xl font-bold">الذكاء الاصطناعي الأقوى لتقييم التشكيلات</p>
    </header>

    <main class="w-full max-w-2xl glass rounded-[2rem] p-6 sm:p-10">
        
        <div class="mb-6 flex flex-col items-center justify-center gap-2">
            <label for="currency-selector" class="text-xs text-gray-400 font-bold uppercase tracking-wider">اختر عملة التقييم:</label>
            <select id="currency-selector" class="glass-card text-white text-sm font-bold rounded-xl px-6 py-3 outline-none border border-gray-600 focus:border-blue-500 transition-all cursor-pointer text-center appearance-none w-full sm:w-1/2">
                <option value="MAD" data-rate="1" data-symbol="د.م">🇲🇦 الدرهم المغربي</option>
                <option value="DZD" data-rate="13.5" data-symbol="د.ج">🇩🇿 الدينار الجزائري</option>
                <option value="EGP" data-rate="4.8" data-symbol="ج.م">🇪🇬 الجنيه المصري</option>
                <option value="TND" data-rate="0.31" data-symbol="د.ت">🇹🇳 الدينار التونسي</option>
                <option value="USD" data-rate="0.10" data-symbol="$">🇺🇸 الدولار الأمريكي</option>
            </select>
        </div>

        <div id="drop-area" class="relative group border-2 border-dashed border-gray-600/80 rounded-3xl p-8 transition-all hover:border-blue-500 hover:bg-blue-900/10 cursor-pointer text-center flex flex-col items-center justify-center min-h-[200px]">
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <div id="upload-ui" class="transition-transform group-hover:scale-105 duration-300">
                <div class="bg-blue-500/20 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 shadow-[0_0_15px_rgba(59,130,246,0.3)] group-hover:shadow-[0_0_25px_rgba(59,130,246,0.6)] transition-shadow">
                    <svg class="w-10 h-10 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
                </div>
                <p class="text-gray-200 font-bold text-lg">ارفع صورة التشكيلة هنا</p>
                <p class="text-blue-400/80 text-xs mt-2 bg-blue-900/30 px-3 py-1 rounded-full inline-block">يجب أن تظهر التشكيلة الأساسية والاحتياط بوضوح</p>
            </div>
            <img id="preview" class="hidden w-full max-h-80 object-contain rounded-2xl shadow-2xl mx-auto z-10">
        </div>

        <button id="analyze-btn" class="w-full mt-8 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-black text-lg py-4 rounded-2xl transition-all shadow-[0_10px_20px_rgba(59,130,246,0.3)] hover:shadow-[0_15px_30px_rgba(59,130,246,0.5)] hover:-translate-y-1 hidden flex items-center justify-center gap-3">
            <span>ابدأ فحص الحساب 🚀</span>
        </button>

        <div id="result-container" class="mt-8 hidden">
            <div id="report-content" class="text-right"></div>
        </div>
    </main>

    <footer class="mt-10 text-gray-500 text-xs text-center pb-6">
        <p>جميع الحقوق محفوظة &copy; 2026 Check eFootball AI Pro</p>
    </footer>

    <script>
        // 🔥 المفتاح المدفوع الخاص بك (سريع ومستقر) 🔥
        const API_KEY = "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";
        
        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyze-btn');
        const resultContainer = document.getElementById('result-container');
        const reportContent = document.getElementById('report-content');
        const currencySelector = document.getElementById('currency-selector');

        document.getElementById('drop-area').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (el) => {
                    preview.src = el.target.result;
                    preview.classList.remove('hidden');
                    document.getElementById('upload-ui').classList.add('hidden');
                    analyzeBtn.classList.remove('hidden');
                    resultContainer.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        function formatCurrency(priceInMad) {
            const selectedOption = currencySelector.options[currencySelector.selectedIndex];
            const rate = parseFloat(selectedOption.getAttribute('data-rate'));
            const symbol = selectedOption.getAttribute('data-symbol');
            const currencyVal = selectedOption.value;

            let converted = priceInMad * rate;
            
            if(currencyVal === 'USD' || currencyVal === 'TND') {
                return converted.toFixed(2) + ' ' + symbol;
            } else {
                return Math.round(converted) + ' ' + symbol;
            }
        }

        function calculatePlayerPriceMAD(r, isPremium) {
            let rating = parseInt(r);
            if (isNaN(rating)) return 0;
            if (rating < 100) return 1;
            if (rating === 100) return 2;
            if (rating === 101) return 3;
            if (rating === 102) return 4;
            if (rating === 103) return 5;
            if (rating === 104) return 9;
            
            if (isPremium) {
                if (rating === 105) return 30;
                if (rating === 106) return 35;
                if (rating === 107) return 40;
                if (rating === 108) return 45;
                if (rating >= 109) return 50;
            } else {
                if (rating === 105) return 18;
                if (rating === 106) return 23;
                if (rating === 107) return 26;
                if (rating === 108) return 29;
                if (rating >= 109) return 32;
            }
            return 1;
        }

        function getStrengthBonusMAD(s) {
            if (s < 3100) return 5;
            if (s >= 3100 && s < 3140) return 10;
            if (s >= 3140 && s < 3160) return 15;
            if (s >= 3160 && s < 3180) return 20;
            if (s >= 3180 && s < 3200) return 30;
            if (s >= 3200 && s < 3210) return 50;
            if (s >= 3210 && s < 3215) return 70;
            if (s >= 3215 && s < 3220) return 120;
            if (s >= 3220 && s < 3230) return 160;
            if (s >= 3230 && s < 3240) return 200;
            if (s >= 3240 && s < 3250) return 230;
            if (s >= 3250 && s < 3260) return 250;
            if (s >= 3260 && s < 3270) return 320;
            if (s >= 3270 && s < 3280) return 390;
            if (s >= 3280 && s < 3290) return 430;
            if (s >= 3290 && s < 3300) return 480;
            if (s >= 3300 && s < 3315) return 520;
            if (s >= 3315 && s < 3325) return 580;
            if (s >= 3325) return 620;
            return 0;
        }

        analyzeBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) return;

            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '<div class="loader"></div> <span class="mr-2">جاري فحص الحساب بالذكاء الاصطناعي...</span>';
            resultContainer.classList.remove('hidden');
            reportContent.innerHTML = `
                <div class="flex flex-col items-center justify-center py-10">
                    <div class="loader mb-4 border-blue-400 border-t-blue-600 w-10 h-10 border-4"></div>
                    <p class="text-blue-400 font-bold">جاري استخراج البيانات وتقييم الحساب...</p>
                </div>
            `;

            const base64Image = preview.src;

            try {
                // اتصال مباشر بدون تعقيدات الدوران
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "meta-llama/llama-4-scout-17b-16e-instruct",
                        messages: [
                            {
                                role: "user",
                                content: [
                                    { type: "text", text: "Identify eFootball collective strength and EXACTLY 23 player ratings (11 starters + 12 subs). You MUST return 23 numbers. Return JSON only exactly like this: {\"strength\": 3210, \"ratings\": [102, 105...], \"note\": \"Arabic review\"}" },
                                    { type: "image_url", image_url: { url: base64Image } }
                                ]
                            }
                        ]
                    })
                });

                const result = await response.json();
                if (!response.ok) throw new Error(result.error?.message || "حدث خطأ غير متوقع في الخادم.");

                let aiText = result.choices[0].message.content;
                let jsonString = aiText.substring(aiText.indexOf('{'), aiText.lastIndexOf('}') + 1);
                let data = JSON.parse(jsonString);
                
                let strength = parseInt(data.strength) || 0;
                let playersTotalMAD = 0;
                let ratingsHtml = '';
                
                let highTierCount = 0;
                let sumRatings = 0;
                let validPlayersArray = [];

                if (data.ratings && Array.isArray(data.ratings)) {
                    data.ratings.forEach(r => {
                        let rNum = parseInt(r);
                        if (!isNaN(rNum)) {
                            validPlayersArray.push(rNum);
                            if (rNum > 104) highTierCount++;
                            sumRatings += rNum;
                        }
                    });
                }

                if (validPlayersArray.length < 23) {
                    throw new Error(`⚠️ لم نتمكن من قراءة 23 لاعباً (تم العثور على ${validPlayersArray.length} فقط). يرجى التأكد من رفع صورة واضحة تظهر التشكيلة الأساسية ودكة البدلاء بالكامل.`);
                }

                let isPremium = (strength > 3219 || highTierCount > 4);

                validPlayersArray.forEach(rNum => {
                    let pMad = calculatePlayerPriceMAD(rNum, isPremium);
                    playersTotalMAD += pMad;
                    
                    let displayPrice = formatCurrency(pMad);

                    ratingsHtml += `<div class="glass-card rounded-xl p-2 flex flex-col items-center justify-center hover:bg-blue-900/30 transition-colors border border-gray-700 hover:border-blue-500">
                        <span class="text-sm font-black text-green-400 drop-shadow-md">${rNum}</span>
                        <span class="text-[9px] text-gray-300 font-bold mt-1">${displayPrice}</span>
                    </div>`;
                });

                let avg = (sumRatings / validPlayersArray.length).toFixed(1);
                let avgText = "";
                let avgColor = "";

                if (avg < 102) { avgText = "ضعيف"; avgColor = "text-red-400"; }
                else if (avg >= 102 && avg < 103) { avgText = "متوسط"; avgColor = "text-yellow-400"; }
                else if (avg >= 103 && avg < 104) { avgText = "قوي"; avgColor = "text-blue-400"; }
                else if (avg >= 104 && avg < 106) { avgText = "قوي جداً"; avgColor = "text-purple-400"; }
                else if (avg >= 106) { avgText = "ضخم للغاية"; avgColor = "text-green-400 drop-shadow-[0_0_8px_rgba(74,222,128,0.8)]"; }

                let bonusMAD = getStrengthBonusMAD(strength);
                let jitterMAD = Math.floor(Math.random() * 3) - 1; 
                
                let finalPriceMAD = playersTotalMAD + bonusMAD + jitterMAD;
                if(finalPriceMAD < 0) finalPriceMAD = 0; 

                let finalDisplayPrice = formatCurrency(finalPriceMAD);
                let bonusDisplayPrice = formatCurrency(bonusMAD);

                reportContent.innerHTML = `
                <div class="glass rounded-[2rem] p-6 sm:p-8 border-t-4 border-blue-500 animate-fade-in-up shadow-2xl">
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-gradient-to-br from-blue-900/40 to-blue-800/10 p-5 rounded-2xl border border-blue-500/30 text-center relative overflow-hidden">
                            <div class="absolute -right-4 -top-4 w-16 h-16 bg-blue-500/20 rounded-full blur-xl"></div>
                            <p class="text-gray-400 text-[11px] mb-1 font-bold">القوة الجماعية</p>
                            <h4 class="text-4xl font-black text-blue-400 tracking-tighter drop-shadow-md">${strength}</h4>
                        </div>
                        <div class="bg-gradient-to-br from-yellow-900/40 to-orange-800/10 p-5 rounded-2xl border border-yellow-500/30 text-center relative overflow-hidden">
                            <div class="absolute -left-4 -top-4 w-16 h-16 bg-yellow-500/20 rounded-full blur-xl"></div>
                            <p class="text-gray-400 text-[11px] mb-1 font-bold">السعر التقديري</p>
                            <h4 class="text-3xl font-black text-yellow-400 tracking-tighter drop-shadow-md" dir="ltr">${finalDisplayPrice}</h4>
                            ${bonusMAD > 0 ? `<p class="text-green-400 text-[10px] font-bold mt-1 bg-green-400/10 inline-block px-2 rounded-md">+${bonusDisplayPrice} علاوة</p>` : ''}
                        </div>
                    </div>

                    <div class="glass-card p-5 rounded-2xl border border-gray-600 mb-6 flex justify-between items-center relative overflow-hidden">
                        <div class="text-right z-10">
                            <p class="text-gray-400 text-[10px] mb-1 font-bold">مجموع الطاقات:</p>
                            <h5 class="text-xl font-bold text-gray-100">${sumRatings} <span class="text-[10px] text-gray-500">نقطة</span></h5>
                        </div>
                        <div class="text-left border-r border-gray-600 pr-5 z-10">
                            <p class="text-gray-400 text-[10px] mb-1 font-bold">تقييم الفريق:</p>
                            <h5 class="text-2xl font-black text-white">${avg} <span class="text-sm block sm:inline mt-1 sm:mt-0 ${avgColor}">${avgText}</span></h5>
                        </div>
                    </div>

                    <div class="text-right mb-2">
                         <p class="text-gray-400 text-[11px] mb-3 font-bold uppercase border-b border-gray-700 pb-2">التفاصيل الفردية للاعبين (${validPlayersArray.length}):</p>
                         <div class="grid grid-cols-4 sm:grid-cols-5 gap-2 max-h-48 overflow-y-auto players-scroll p-1">${ratingsHtml}</div>
                    </div>
                </div>`;
            } catch (e) {
                reportContent.innerHTML = `
                <div class="bg-red-900/30 border border-red-500/50 p-6 rounded-2xl text-center animate-fade-in-up">
                    <div class="text-red-400 mb-3"><svg class="w-10 h-10 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg></div>
                    <p class='text-red-300 font-bold text-sm leading-relaxed'>${e.message.includes('⚠️') ? e.message : 'عذراً، حدث خطأ في معالجة الصورة. يرجى المحاولة مرة أخرى لاحقاً.'}</p>
                </div>`;
                if (!e.message.includes('⚠️')) console.error(e);
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = '<span>فحص تشكيلة أخرى 🚀</span>';
            }
        };
    </script>
</body>
</html>
